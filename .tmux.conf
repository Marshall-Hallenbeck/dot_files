# to reload: tmux source-file ~/.tmux.conf

# Notes:
# set-clipboard has three values in tmux:
# on — tmux automatically sends OSC 52 for its own selections AND lets apps send OSC 52 through
# external — tmux does NOT auto-set clipboard from selections, but DOES let apps (like your script) send OSC 52 through to the terminal
# off — blocks all OSC 52, nothing gets through

set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -sg escape-time 1
set-option -g base-index 1
setw -g pane-base-index 1
set -g status-interval 10 # redraw the status line every 10 seconds
set -g mode-keys vi

bind c new-window -c "#{pane_current_path}" # new window, but keep cwd
bind | split-window -h -c "#{pane_current_path}" # split window vertically, keep cwd
bind - split-window -v -c "#{pane_current_path}" # split window horizontally, keep cwd
bind t swap-window -t -1 # swap window with previous window
bind T swap-window -t 1 # swap window with next window
bind b previous-window -t: # go to previous window; n already does next window
bind > swap-pane -D # swap current pane with next one
bind < swap-pane -U # swap current pane with last one

bind-key j command-prompt -p "join pane from:"  "join-pane -s '%%'"
bind-key e command-prompt -p "send pane to:"  "join-pane -t '%%'"

# pane navigation (wasd)
bind w select-pane -U
bind a select-pane -L
bind s select-pane -D
bind d select-pane -R

# window navigation (shift-a/d)
bind A previous-window
bind D next-window

# relocated defaults
bind v choose-tree          # was prefix-w
bind C-d detach-client      # was prefix-d

set -s set-clipboard off
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "bash ~/.tmux/copy-to-clipboard.sh"

# Ensure DISPLAY is updated when reattaching from a new SSH session
set -ga update-environment "DISPLAY"

# enable mouse mode for 2.1 and up
set -g mouse on

set -g default-terminal "tmux-256color"
set-option -g default-shell /bin/zsh # set this to your actual shell, but you should be using zsh :)
set-option -g history-limit 50000 # large history
set-option -g allow-rename off # STOP RENAMING MY TABS

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @continuum-restore 'on'
set -g @continuum-save-internal '10' # set save interval to 10 minutes instead of default 15
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-capture-pane-contents 'on'

# Per-host overrides (not in repo, not symlinked)
if-shell "test -f ~/.tmux.conf.local" "source-file ~/.tmux.conf.local"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
